<svg viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e17"/>

  <!-- Section labels -->
  <text x="30" y="38" fill="#5eead4" font-size="12" font-family="monospace" font-weight="bold">NLP PIPELINE</text>
  <text x="460" y="38" fill="#5eead4" font-size="12" font-family="monospace" font-weight="bold">SUMMARY OUTPUT</text>

  <line x1="420" y1="50" x2="420" y2="360" stroke="#1e2535" stroke-width="1"/>

  <!-- Pipeline stages (left panel) -->
  <!-- Stage 1: Input -->
  <rect x="30" y="60" width="110" height="44" rx="6" fill="#111827" stroke="#5eead4" stroke-width="1.5"/>
  <text x="85" y="80" fill="#5eead4" font-size="11" text-anchor="middle" font-family="monospace">VIDEO INPUT</text>
  <text x="85" y="96" fill="#9ca3af" font-size="10" text-anchor="middle" font-family="monospace">YouTube URL</text>

  <line x1="85" y1="104" x2="85" y2="124" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="80,122 90,122 85,130" fill="#5eead4"/>

  <!-- Stage 2: Transcript -->
  <rect x="30" y="130" width="110" height="44" rx="6" fill="#111827" stroke="#5eead4" stroke-width="1.5"/>
  <text x="85" y="150" fill="#5eead4" font-size="11" text-anchor="middle" font-family="monospace">TRANSCRIPT</text>
  <text x="85" y="166" fill="#9ca3af" font-size="10" text-anchor="middle" font-family="monospace">Audio → Text</text>

  <line x1="85" y1="174" x2="85" y2="194" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="80,192 90,192 85,200" fill="#5eead4"/>

  <!-- Stage 3: Tokenize -->
  <rect x="30" y="200" width="110" height="44" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="220" fill="#3b82f6" font-size="11" text-anchor="middle" font-family="monospace">TOKENIZE</text>
  <text x="85" y="236" fill="#9ca3af" font-size="10" text-anchor="middle" font-family="monospace">BERT Encoder</text>

  <line x1="85" y1="244" x2="85" y2="264" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="80,262 90,262 85,270" fill="#3b82f6"/>

  <!-- Stage 4: Model -->
  <rect x="30" y="270" width="110" height="44" rx="6" fill="#111827" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="85" y="290" fill="#a78bfa" font-size="11" text-anchor="middle" font-family="monospace">TRANSFORMER</text>
  <text x="85" y="306" fill="#9ca3af" font-size="10" text-anchor="middle" font-family="monospace">LSTM · BERT</text>

  <line x1="85" y1="314" x2="85" y2="334" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="80,332 90,332 85,340" fill="#a78bfa"/>

  <!-- Stage 5: Output -->
  <rect x="30" y="340" width="110" height="34" rx="6" fill="#111827" stroke="#5eead4" stroke-width="1.5"/>
  <text x="85" y="362" fill="#5eead4" font-size="11" text-anchor="middle" font-family="monospace">SUMMARY</text>

  <!-- Metrics panel (middle left) -->
  <rect x="165" y="60" width="100" height="56" rx="5" fill="#111827" stroke="#1e2535" stroke-width="1"/>
  <text x="215" y="80" fill="#5eead4" font-size="10" text-anchor="middle" font-family="monospace">ACCURACY</text>
  <text x="215" y="103" fill="#eae5ec" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">+15%</text>

  <rect x="165" y="128" width="100" height="56" rx="5" fill="#111827" stroke="#1e2535" stroke-width="1"/>
  <text x="215" y="148" fill="#5eead4" font-size="10" text-anchor="middle" font-family="monospace">PROC. TIME</text>
  <text x="215" y="171" fill="#eae5ec" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">-20%</text>

  <rect x="165" y="196" width="100" height="56" rx="5" fill="#111827" stroke="#1e2535" stroke-width="1"/>
  <text x="215" y="216" fill="#5eead4" font-size="10" text-anchor="middle" font-family="monospace">ENGAGEMENT</text>
  <text x="215" y="239" fill="#eae5ec" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">+30%</text>

  <!-- Attention waveform -->
  <text x="165" y="282" fill="#4a5568" font-size="10" font-family="monospace">Attention Weights</text>
  <polyline points="165,320 178,295 190,310 202,280 215,270 228,285 240,265 252,278 264,260 276,275 288,255 300,268 312,252 324,270 336,248 348,265 360,245 372,258 384,252 396,245" stroke="#5eead4" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <polygon points="165,320 396,320 396,245 384,252 372,258 360,245 348,265 336,248 324,270 312,252 300,268 288,255 276,275 264,260 252,278 240,265 228,285 215,270 202,280 190,310 178,295 165,320" fill="#5eead4" opacity="0.06"/>

  <!-- Summary output panel (right) -->
  <!-- Video thumbnail placeholder -->
  <rect x="435" y="55" width="145" height="82" rx="5" fill="#111827" stroke="#1e2535" stroke-width="1"/>
  <polygon points="490,85 490,107 510,96" fill="#5eead4" opacity="0.6"/>
  <text x="507" y="122" fill="#4a5568" font-size="9" text-anchor="middle" font-family="monospace">Input Video</text>

  <!-- Summary text blocks -->
  <text x="435" y="160" fill="#4a5568" font-size="10" font-family="monospace">Generated Summary:</text>
  <rect x="435" y="168" width="320" height="10" rx="3" fill="#5eead4" opacity="0.6"/>
  <rect x="435" y="184" width="290" height="10" rx="3" fill="#5eead4" opacity="0.45"/>
  <rect x="435" y="200" width="310" height="10" rx="3" fill="#5eead4" opacity="0.5"/>
  <rect x="435" y="216" width="260" height="10" rx="3" fill="#5eead4" opacity="0.35"/>
  <rect x="435" y="232" width="300" height="10" rx="3" fill="#5eead4" opacity="0.4"/>
  <rect x="435" y="248" width="180" height="10" rx="3" fill="#5eead4" opacity="0.25"/>

  <!-- Key topics -->
  <text x="435" y="282" fill="#4a5568" font-size="10" font-family="monospace">Key Topics:</text>
  <rect x="435" y="290" width="60" height="20" rx="10" fill="#5eead4" opacity="0.15" stroke="#5eead4" stroke-width="1"/>
  <text x="465" y="304" fill="#5eead4" font-size="9" text-anchor="middle" font-family="monospace">NLP</text>
  <rect x="502" y="290" width="80" height="20" rx="10" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="542" y="304" fill="#3b82f6" font-size="9" text-anchor="middle" font-family="monospace">Summarize</text>
  <rect x="590" y="290" width="70" height="20" rx="10" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1"/>
  <text x="625" y="304" fill="#a78bfa" font-size="9" text-anchor="middle" font-family="monospace">Encode</text>
  <rect x="668" y="290" width="80" height="20" rx="10" fill="#5eead4" opacity="0.12" stroke="#5eead4" stroke-width="1"/>
  <text x="708" y="304" fill="#5eead4" font-size="9" text-anchor="middle" font-family="monospace">Recommend</text>

  <!-- Engagement chart -->
  <text x="435" y="338" fill="#4a5568" font-size="10" font-family="monospace">CTR over time:</text>
  <polyline points="435,360 490,350 535,340 580,325 625,310 670,298 720,285 765,270" stroke="#5eead4" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="435,360 765,360 765,270 720,285 670,298 625,310 580,325 535,340 490,350 435,360" fill="#5eead4" opacity="0.07"/>

  <!-- Title -->
  <text x="400" y="415" fill="#4a5568" font-size="13" text-anchor="middle" font-family="monospace">YouTube Summarizer — LSTM · BERT · Transformer · Recommendation Engine</text>
</svg>
