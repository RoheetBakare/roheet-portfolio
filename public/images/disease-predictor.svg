<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e17"/>

  <!-- Section labels -->
  <text x="30" y="38" fill="#5eead4" font-size="12" font-family="monospace" font-weight="bold">CONFUSION MATRIX</text>
  <text x="430" y="38" fill="#5eead4" font-size="12" font-family="monospace" font-weight="bold">ROC CURVE</text>

  <line x1="390" y1="50" x2="390" y2="340" stroke="#1e2535" stroke-width="1"/>

  <!-- Confusion Matrix -->
  <!-- Axis labels -->
  <text x="155" y="68" fill="#4a5568" font-size="11" text-anchor="middle" font-family="monospace">Predicted</text>
  <text x="108" y="85" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">Neg</text>
  <text x="205" y="85" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">Pos</text>
  <text x="50" y="160" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace" transform="rotate(-90 50 160)">Actual</text>
  <text x="75" y="140" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">Neg</text>
  <text x="75" y="240" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">Pos</text>

  <!-- TN cell -->
  <rect x="86" y="95" width="92" height="92" rx="4" fill="#5eead4" opacity="0.8"/>
  <text x="132" y="141" fill="#0a0e17" font-size="26" text-anchor="middle" font-family="monospace" font-weight="bold">847</text>
  <text x="132" y="160" fill="#0a0e17" font-size="10" text-anchor="middle" font-family="monospace">True Neg</text>

  <!-- FP cell -->
  <rect x="183" y="95" width="92" height="92" rx="4" fill="#ef4444" opacity="0.25"/>
  <text x="229" y="141" fill="#eae5ec" font-size="26" text-anchor="middle" font-family="monospace" font-weight="bold">53</text>
  <text x="229" y="160" fill="#ef4444" font-size="10" text-anchor="middle" font-family="monospace">False Pos</text>

  <!-- FN cell -->
  <rect x="86" y="192" width="92" height="92" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="132" y="238" fill="#eae5ec" font-size="26" text-anchor="middle" font-family="monospace" font-weight="bold">37</text>
  <text x="132" y="257" fill="#ef4444" font-size="10" text-anchor="middle" font-family="monospace">False Neg</text>

  <!-- TP cell -->
  <rect x="183" y="192" width="92" height="92" rx="4" fill="#5eead4" opacity="0.8"/>
  <text x="229" y="238" fill="#0a0e17" font-size="26" text-anchor="middle" font-family="monospace" font-weight="bold">763</text>
  <text x="229" y="257" fill="#0a0e17" font-size="10" text-anchor="middle" font-family="monospace">True Pos</text>

  <!-- Metrics below matrix -->
  <text x="86" y="312" fill="#9ca3af" font-size="11" font-family="monospace">Accuracy:</text>
  <text x="160" y="312" fill="#5eead4" font-size="11" font-family="monospace" font-weight="bold">94.1%</text>
  <text x="210" y="312" fill="#9ca3af" font-size="11" font-family="monospace">F1:</text>
  <text x="232" y="312" fill="#5eead4" font-size="11" font-family="monospace" font-weight="bold">0.938</text>
  <text x="290" y="312" fill="#9ca3af" font-size="11" font-family="monospace">AUC:</text>
  <text x="320" y="312" fill="#5eead4" font-size="11" font-family="monospace" font-weight="bold">0.97</text>

  <!-- ROC Curve panel -->
  <!-- Axes -->
  <line x1="420" y1="55" x2="420" y2="320" stroke="#1e2535" stroke-width="1.5"/>
  <line x1="420" y1="320" x2="770" y2="320" stroke="#1e2535" stroke-width="1.5"/>

  <!-- Random classifier diagonal -->
  <line x1="420" y1="320" x2="770" y2="55" stroke="#374151" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="690" y="125" fill="#374151" font-size="10" font-family="monospace">Random</text>

  <!-- Grid -->
  <line x1="420" y1="188" x2="770" y2="188" stroke="#1e2535" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="595" y1="55" x2="595" y2="320" stroke="#1e2535" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ROC curve - Random Forest -->
  <path d="M420,320 C460,120 520,80 595,70 C670,62 720,58 770,55" stroke="#5eead4" stroke-width="2.5" fill="none"/>
  <!-- Area under ROC -->
  <path d="M420,320 C460,120 520,80 595,70 C670,62 720,58 770,55 L770,320 Z" fill="#5eead4" opacity="0.07"/>

  <!-- ROC curve - SVM -->
  <path d="M420,320 C450,160 510,100 595,85 C670,72 720,65 770,60" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <!-- AUC label -->
  <rect x="440" y="130" width="130" height="50" rx="5" fill="#111827" stroke="#5eead4" stroke-width="1"/>
  <text x="505" y="152" fill="#5eead4" font-size="11" text-anchor="middle" font-family="monospace">AUC = 0.97</text>
  <text x="505" y="170" fill="#9ca3af" font-size="10" text-anchor="middle" font-family="monospace">Random Forest</text>

  <!-- Axis labels -->
  <text x="595" y="340" fill="#4a5568" font-size="11" text-anchor="middle" font-family="monospace">False Positive Rate</text>
  <text x="405" y="188" fill="#4a5568" font-size="10" text-anchor="end" font-family="monospace" transform="rotate(-90 405 188)">True Positive Rate</text>
  <text x="420" y="352" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">0.0</text>
  <text x="770" y="352" fill="#4a5568" font-size="10" text-anchor="middle" font-family="monospace">1.0</text>
  <text x="408" y="324" fill="#4a5568" font-size="10" font-family="monospace">0.0</text>
  <text x="408" y="59" fill="#4a5568" font-size="10" font-family="monospace">1.0</text>

  <!-- Legend -->
  <line x1="580" y1="290" x2="600" y2="290" stroke="#5eead4" stroke-width="2.5"/>
  <text x="608" y="295" fill="#9ca3af" font-size="11" font-family="monospace">Random Forest</text>
  <line x1="580" y1="308" x2="600" y2="308" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="608" y="313" fill="#9ca3af" font-size="11" font-family="monospace">SVM</text>

  <!-- Title -->
  <text x="400" y="410" fill="#4a5568" font-size="13" text-anchor="middle" font-family="monospace">Disease Predictor — Random Forest · SVM · Python · Clinical Data</text>
</svg>
