<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e17"/>
  <!-- Teal radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#5eead4" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Top accent line -->
  <rect x="80" y="80" width="60" height="3" fill="#5eead4"/>
  <!-- Name -->
  <text x="80" y="260" font-family="sans-serif" font-size="90" font-weight="700" fill="#eae5ec" letter-spacing="-2">ROHEET BAKARE</text>
  <!-- Title -->
  <text x="80" y="340" font-family="sans-serif" font-size="36" font-weight="300" fill="#5eead4" letter-spacing="3">DATA SCIENTIST &amp; ML ENGINEER</text>
  <!-- Tagline -->
  <text x="80" y="410" font-family="sans-serif" font-size="22" font-weight="300" fill="#adacac">7+ years · NLP · Predictive Modeling · Cloud ML · Analytics</text>
  <!-- URL -->
  <text x="80" y="530" font-family="sans-serif" font-size="20" font-weight="300" fill="#5eead4" opacity="0.7">roheet-portfolio.vercel.app</text>
  <!-- Decorative right side dots -->
  <circle cx="1080" cy="180" r="3" fill="#5eead4" opacity="0.4"/>
  <circle cx="1110" cy="200" r="2" fill="#5eead4" opacity="0.3"/>
  <circle cx="1060" cy="220" r="4" fill="#5eead4" opacity="0.2"/>
  <circle cx="1100" cy="260" r="2" fill="#5eead4" opacity="0.4"/>
  <circle cx="1070" cy="300" r="3" fill="#5eead4" opacity="0.3"/>
</svg>
